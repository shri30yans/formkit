site_name: formkit
site_description: Body-centric parametric CAD for Python
site_url: https://github.com/shri30yans/formkit
repo_url: https://github.com/shri30yans/formkit
repo_name: shri30yans/formkit

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts: concepts.md
  - Guides:
      - Shapes & profiles: guides/shapes.md
      - Solids & placement: guides/solids.md
      - Body features: guides/features.md
      - Hull, offset & extrude: guides/csg.md
      - Params & rebuild: guides/params.md
  - Examples: examples.md
  - API reference:
      - Overview: api/index.md
      - Document: api/document.md
      - Body: api/body.md
      - Frame: api/frame.md
      - Profile & Shape: api/profile.md
      - Solids: api/solid.md
      - Params: api/param.md
      - Queries: api/query.md
      - Errors: api/errors.md

extra:
  version: 0.5.0
